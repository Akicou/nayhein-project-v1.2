# configs/sft_5b.yaml
# Stage 3: SFT for 5B model using QLoRA (4-bit + LoRA to fit on 4×H100)

model_size: 5B
precision: bfloat16

learning_rate: 2.0e-5
epochs: 3
batch_size_per_device: 4
gradient_accumulation_steps: 8
sequence_length: 4096
lr_schedule: cosine
warmup_ratio: 0.03
loss_mask: true
packing: true
vision_encoder_frozen: false           # unfreeze vision for SFT

fsdp_sharding_strategy: FULL_SHARD
fsdp_mixed_precision: bfloat16
flash_attention: true

# QLoRA enabled for 5B to fit on 4×80GB
qlora_enabled: true
qlora_bits: 4
lora_r: 64
lora_alpha: 128
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj
lora_dropout: 0.05

wandb_project: "nayhein-v1.2"
log_every_n_steps: 10
save_every_n_steps: 500
