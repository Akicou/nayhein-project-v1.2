# configs/nayhein_50m.yaml
# Training configuration for Stage 1: 50M Base pretraining on 4×H100

# ── Model ─────────────────────────────────────────────────────────────────────
model_size: 50M
precision: bfloat16

# ── Data ──────────────────────────────────────────────────────────────────────
sequence_length: 4096
packing: true

# ── Optimization ──────────────────────────────────────────────────────────────
batch_size_per_device: 16
gradient_accumulation_steps: 4        # effective global batch = 16*4*4GPUs = 256 seqs ≈ 1M tokens/step
learning_rate: 3.0e-3
lr_schedule: cosine_with_warmup
warmup_steps: 2000
weight_decay: 0.1
beta1: 0.9
beta2: 0.95
epsilon: 1.0e-8
max_grad_norm: 1.0
total_tokens: 100_000_000_000          # 100B tokens

# ── Losses ────────────────────────────────────────────────────────────────────
loss_ar_weight: 1.0
loss_mtp_weight: 0.3
loss_diffusion_weight: 0.5
diffusion_training_probability: 0.5   # 50% of batches use diffusion loss

# ── Multi-GPU (FSDP) ──────────────────────────────────────────────────────────
fsdp_sharding_strategy: FULL_SHARD
fsdp_cpu_offload: false
fsdp_mixed_precision: bfloat16
fsdp_activation_checkpointing: true
compile: true                          # torch.compile(model, mode="reduce-overhead")
flash_attention: true

# ── Logging ───────────────────────────────────────────────────────────────────
log_every_n_steps: 10
eval_every_n_steps: 10000
save_every_n_steps: 25000
wandb_project: "nayhein-v1.2"
