# configs/sft_50m.yaml
# Stage 3: SFT for 50M model (full fine-tuning, no QLoRA)

model_size: 50M
precision: bfloat16

learning_rate: 2.0e-5
epochs: 3
batch_size_per_device: 4
gradient_accumulation_steps: 8        # effective batch = 4*8*4GPUs = 128 seqs
sequence_length: 4096
lr_schedule: cosine
warmup_ratio: 0.03
loss_mask: true                        # compute loss on assistant tokens only
packing: true
vision_encoder_frozen: false           # unfreeze vision for SFT

fsdp_sharding_strategy: FULL_SHARD
fsdp_mixed_precision: bfloat16
fsdp_activation_checkpointing: true
flash_attention: true

# QLoRA disabled for 50M (full fine-tuning)
qlora_enabled: false

wandb_project: "nayhein-v1.2"
log_every_n_steps: 10
save_every_n_steps: 1000
